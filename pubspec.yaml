name: flutter_esp32_ble_wifi
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State Management & Data Models ---
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # --- Networking & Communication ---
  dio: ^5.9.1
  mqtt_client: ^10.11.9
  web_socket_channel: ^3.0.1
  multicast_dns: ^0.3.3
  http: ^1.6.0
  connectivity_plus: ^7.0.0

  # --- IoT & Hardware Interface ---
  flutter_blue_plus: ^2.2.1
  wifi_scan: ^0.4.1+2
  wifi_iot: ^0.3.19+2
  network_info_plus: ^7.0.0

  # --- Authentication & Notification (Firebase) ---
  google_sign_in: ^7.2.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.0.0

  # --- Storage & Environment ---
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0

  # --- UI/UX & Navigation & Utilities ---
  go_router: ^17.0.1
  skeletonizer: ^2.1.3
  intl: ^0.19.0
  permission_handler: ^12.0.1
  location: ^8.0.1
  app_settings: ^7.0.0
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # --- Code Generators ---
  build_runner: ^2.10.4
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^3.0.3

flutter:
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/
